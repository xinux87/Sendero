# Despliegue de producción con imagen publicada en Docker Hub (no build local).
# Variables (con valores por defecto) desde .env — ver .env.example:
#   SENDERO_VERSION    tag de imagen (por defecto la versión publicada actual)
#   SENDERO_DATA_DIR   ruta host de datos (/data en el contenedor)
#   SENDERO_WATCH_DIR  ruta host de la carpeta vigilada
# REGLA: en cada publicación de versión, actualiza el default de SENDERO_VERSION
# aquí y en .env.example a la nueva versión.
services:
  sendero:
    image: xinux87/sendero:${SENDERO_VERSION:-0.5.1}
    container_name: sendero
    ports:
      - "8090:8080"
    volumes:
      - ${SENDERO_DATA_DIR:-./data}:/data      # rutas GPX, fotos locales y base de datos
    environment:
      - SENDERO_DATA=/data
    restart: unless-stopped

  # Importación automática: vigila ./watch y sube los GPX que Syncthing deje ahí.
  # Si no usas importación automática, puedes borrar este servicio.
  watcher:
    image: xinux87/sendero:${SENDERO_VERSION:-0.5.1}
    container_name: sendero-watcher
    command: ["python", "watch.py"]
    volumes:
      - ${SENDERO_WATCH_DIR:-./watch}:/watch   # apunta aquí tu carpeta sincronizada con Syncthing
    environment:
      - SENDERO_API=http://sendero:8080
      - SENDERO_WATCH_DIR=/watch
      - SENDERO_POLL=30
    depends_on:
      - sendero
    restart: unless-stopped

  # Auto-importación desde Mi Fit / Zepp (Huami). Token, intervalo y sincronización
  # se controlan desde Ajustes → Mi Fit / Zepp. Si no usas reloj Amazfit/Zepp/Mi Fit,
  # puedes borrar este servicio.
  mifit-sync:
    image: xinux87/sendero:${SENDERO_VERSION:-0.5.1}
    container_name: sendero-mifit-sync
    command: ["python", "mifit_sync.py"]
    volumes:
      - ${SENDERO_DATA_DIR:-./data}:/data      # lee/escribe los ajustes y el estado de sync en la BD
    environment:
      - SENDERO_API=http://sendero:8080
      - SENDERO_DATA=/data
      - MIFIT_POLL=30
    depends_on:
      - sendero
    restart: unless-stopped
