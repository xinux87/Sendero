services:
  sendero:
    build: .
    container_name: sendero
    ports:
      - "8090:8080"
    volumes:
      - ./data:/data            # rutas GPX, fotos locales y base de datos
    environment:
      - SENDERO_DATA=/data
    restart: unless-stopped

  # Importación automática: vigila ./watch y sube los GPX que Syncthing deje ahí.
  # Si no usas importación automática, puedes borrar este servicio.
  watcher:
    build: .
    container_name: sendero-watcher
    command: ["python", "watch.py"]
    volumes:
      - ./watch:/watch          # apunta aquí tu carpeta sincronizada con Syncthing
    environment:
      - SENDERO_API=http://sendero:8080
      - SENDERO_WATCH_DIR=/watch
      - SENDERO_POLL=30
    depends_on:
      - sendero
    restart: unless-stopped

  # Servicio DEM opcional para "Recalcular elevación" en el editor de rutas.
  # 1) Descomenta el bloque, 2) descarga un dataset (p.ej. EU-DEM) siguiendo
  #    https://www.opentopodata.org/datasets/eudem/ en ./demdata/eudem25m/,
  # 3) en Sendero → Ajustes → Editor pon: http://opentopodata:5000/v1/eudem25m
  # opentopodata:
  #   image: ghcr.io/ajnisbet/opentopodata:latest
  #   container_name: sendero-dem
  #   volumes:
  #     - ./demdata:/app/data:ro
  #   restart: unless-stopped

  # Motor de rutas opcional para el modo "seguir senderos" al dibujar rutas.
  # 1) Descomenta el bloque, 2) descarga los segmentos de tu región (archivos
  #    .rd5 de https://brouter.de/brouter/segments4/) en ./brouter-segments/,
  # 3) en Sendero → Ajustes → Editor pon: http://brouter:17777
